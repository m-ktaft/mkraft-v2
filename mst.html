<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1e2d31; font-family:sans-serif; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; }
#log { color:#F5C04A; font-size:14px; text-align:center; line-height:2; }
#counter { color:#fff; font-size:48px; font-weight:700; }
</style>
</head>
<body>

<div id="log">Wische auf der Wabe links/rechts</div>
<div id="counter">14.0</div>

<svg width="220" height="200" viewBox="0 0 220 200" style="touch-action:none">
  <!-- Hauptwabe -->
  <defs>
    <linearGradient id="vg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A6970"/>
      <stop offset="100%" stop-color="#324A52"/>
    </linearGradient>
  </defs>
  <polygon id="wabe" points="196,100 153,174 67,174 24,100 67,26 153,26"
    fill="url(#vg)" stroke="#F5C04A" stroke-width="3"/>
  <text x="110" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#F5C04A">Goblet Squat</text>
  <text id="val" x="110" y="118" text-anchor="middle" font-size="14" fill="#E0EAF0">14.0 / 8</text>
</svg>

<script>
const log = document.getElementById('log');
const counter = document.getElementById('counter');
const valEl = document.getElementById('val');
const wabe = document.getElementById('wabe');

let weight = 14.0;
let startX = 0;
let lastX = 0;
let active = false;

function setLog(msg) {
  log.textContent = msg;
}

// TEST 1: touchstart
wabe.addEventListener('touchstart', function(e) {
  e.preventDefault();
  active = true;
  startX = e.touches[0].clientX;
  lastX = startX;
  setLog('touchstart: x=' + Math.round(startX));
}, {passive: false});

// TEST 2: touchmove
wabe.addEventListener('touchmove', function(e) {
  e.preventDefault();
  const x = e.touches[0].clientX;
  const dx = x - lastX;
  setLog('touchmove: dx=' + Math.round(x - startX) + ' chunk=' + Math.round(dx));
  if (Math.abs(x - lastX) >= 30) {
    if (x > lastX) {
      weight = Math.round((weight + 2.5) * 10) / 10;
    } else {
      weight = Math.max(0.5, Math.round((weight - 2.5) * 10) / 10);
    }
    lastX = x;
    counter.textContent = weight.toFixed(1);
    valEl.textContent = weight.toFixed(1) + ' / 8';
    setLog('GEWICHT: ' + weight.toFixed(1));
  }
}, {passive: false});

// TEST 3: touchend
wabe.addEventListener('touchend', function(e) {
  e.preventDefault();
  setLog('touchend — total dx=' + Math.round(e.changedTouches[0].clientX - startX));
  active = false;
}, {passive: false});

setLog('Bereit — tippe oder wische auf die Wabe');
</script>
</body>
</html>
