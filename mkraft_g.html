<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#324A52">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="mkraft">
<title>mkraft</title>
<link rel="manifest" href="mkraft_manifest_g.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --petrol-dark:#324A52;--petrol:#4A6970;--petrol-mid:#6E8896;
  --amber:#F5C04A;--amber-hot:#FFE8A0;
  --text-light:#E0EAF0;
  --surface2:#243540;--surface3:#2e404a;
  --border:rgba(245,192,74,0.25);--border2:rgba(255,255,255,0.1);
  --radius:20px;
}
html,body{width:100%;background:#F5F4EE;font-family:Inter,sans-serif;overflow-x:hidden;}

/* Main frame */
.main-frame{
  width:100%;
  display:flex;
  justify-content:center;
  position:relative;
}

/* SVG wrapper - position relative so hit divs can overlay */
.svg-wrap{
  position:relative;
  width:100%;
  max-width:412px;
}
.svg-wrap svg{
  width:100%;height:auto;
  display:block;
}

/* Hit areas - absolutely positioned over waben */
.hit-layer{
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  pointer-events:none;
}
.hit-layer > div{
  position:absolute;
  pointer-events:all;
}

/* SCREENS */
.screen{
  position:fixed;inset:0;z-index:50;
  display:flex;flex-direction:column;
  background:var(--petrol-dark);
  transform:translateY(100%);
  transition:transform .32s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}
.screen.open{transform:translateY(0)}
.scr-header{
  display:flex;align-items:center;gap:14px;
  padding:max(env(safe-area-inset-top,16px),16px) 20px 16px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;background:var(--petrol-dark);
}
.scr-back{
  width:40px;height:40px;border-radius:50%;
  border:1px solid var(--border);background:transparent;
  color:var(--amber);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-family:Inter,sans-serif;
}
.scr-title{font-size:18px;font-weight:700;color:var(--amber);flex:1}
.scr-body{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}

.sl{font-size:10px;font-weight:700;color:var(--petrol-mid);letter-spacing:.14em;text-transform:uppercase;margin:24px 0 12px;display:flex;align-items:center;gap:10px;}
.sl::after{content:"";flex:1;height:1px;background:var(--border)}
.sl:first-child{margin-top:0}

.card{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:18px;margin-bottom:12px;}
.card-title{font-size:15px;font-weight:700;color:var(--amber);margin-bottom:6px}
.card-body{font-size:14px;color:var(--text-light);line-height:1.6}

/* Detail screen */
.detail-hero{background:linear-gradient(160deg,var(--petrol),var(--petrol-dark));border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:16px;text-align:center;}
.detail-emoji{font-size:42px;margin-bottom:10px}
.detail-name{font-size:22px;font-weight:800;color:var(--amber);}
.detail-muscle{font-size:13px;color:var(--petrol-mid);margin-top:4px}
.val-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.val-tile{background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:14px 8px;text-align:center;}
.val-tile-label{font-size:10px;font-weight:700;color:var(--petrol-mid);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.val-tile-ctrl{display:flex;align-items:center;justify-content:center;gap:8px}
.val-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--amber);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:Inter,sans-serif;line-height:1;}
.val-btn:active{background:rgba(245,192,74,0.15)}
.val-num{font-size:18px;font-weight:700;color:var(--text-light);min-width:36px;text-align:center}
.history-wrap{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.history-title{font-size:11px;font-weight:700;color:var(--petrol-mid);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.chart-area{height:80px;position:relative;display:flex;align-items:flex-end;gap:4px}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.chart-bar{width:100%;background:var(--petrol);border-radius:4px 4px 0 0;min-height:2px}
.chart-bar.current{background:var(--amber)}
.chart-lbl{font-size:9px;color:var(--petrol-mid);text-align:center}
.chart-val{font-size:9px;color:var(--text-light);font-weight:600;text-align:center}
.no-history{font-size:13px;color:var(--petrol-mid);text-align:center;padding:16px 0}
.note-box{background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:14px 16px;margin-bottom:12px;font-size:13px;color:var(--text-light);line-height:1.65}

/* Menu */
.menu-item{display:flex;align-items:center;gap:14px;background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;}
.menu-item:active{background:var(--surface3)}
.menu-icon{font-size:22px;width:36px;text-align:center;flex-shrink:0}
.menu-label{font-size:15px;font-weight:600;color:var(--text-light);flex:1}
.menu-chevron{color:var(--petrol-mid);font-size:14px}

/* Subscreen */



/* KW */
.kw-input-row{display:flex;gap:10px;margin-bottom:16px}
.kw-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;font-size:18px;font-weight:700;color:var(--text-light);font-family:Inter,sans-serif;text-align:center;outline:none;}
.kw-input:focus{border-color:var(--amber)}
.kw-save-btn{padding:14px 20px;background:var(--amber);border:none;border-radius:12px;color:#1a0e00;font-size:15px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif;}
.kw-entry{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border2);font-size:14px;color:var(--text-light);}
.kw-entry:last-child{border-bottom:none}
.kw-date{color:var(--petrol-mid);font-size:12px}
.kw-val{font-weight:700;color:var(--amber)}

/* Ziele */
.goals-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.goal-card{background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:14px 12px;}
.goal-title{font-size:13px;font-weight:700;color:var(--amber);margin-bottom:5px}
.goal-desc{font-size:12px;color:var(--text-light);line-height:1.5}

/* Prinzipien */
.prinzip-card{background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:16px;margin-bottom:10px;}
.prinzip-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.prinzip-icon{font-size:20px}
.prinzip-title{font-size:14px;font-weight:700;color:var(--amber)}
.prinzip-text{font-size:13px;color:var(--text-light);line-height:1.55}
.prinzip-detail{font-size:12px;color:var(--petrol-mid);margin-top:6px;line-height:1.5}

/* Alternativen */
.alt-card{background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:16px;margin-bottom:10px;}
.alt-label{font-size:14px;font-weight:700;color:var(--amber);margin-bottom:8px}
.alt-row{font-size:12px;color:var(--text-light);line-height:1.7}
.alt-key{color:var(--petrol-mid);font-weight:600}

/* Einstellungen */
.setting-row{display:flex;justify-content:space-between;align-items:center;background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:16px;margin-bottom:10px;}
.setting-label{font-size:14px;font-weight:600;color:var(--text-light)}
.setting-sub{font-size:12px;color:var(--petrol-mid);margin-top:3px}
.step-ctrl{display:flex;align-items:center;gap:10px}
.step-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--amber);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:Inter,sans-serif;}
.step-btn:active{background:rgba(245,192,74,0.15)}
.step-val{font-size:16px;font-weight:700;color:var(--amber);min-width:44px;text-align:center}
.danger-btn{width:100%;padding:16px;border-radius:14px;border:1px solid rgba(255,85,85,0.3);background:rgba(255,85,85,0.08);color:#ff5555;font-size:14px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;margin-bottom:10px;text-align:left;}
.danger-btn:active{background:rgba(255,85,85,0.18)}
.action-btn{width:100%;padding:16px;border-radius:14px;border:1px solid var(--border);background:var(--surface2);color:var(--text-light);font-size:14px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.action-btn:active{background:var(--surface3)}

/* Confirm */
.confirm-backdrop{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.confirm-backdrop.visible{opacity:1;pointer-events:all}
.confirm-box{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:28px 24px;max-width:320px;width:90%;}
.confirm-title{font-size:17px;font-weight:700;color:var(--text-light);margin-bottom:8px}
.confirm-msg{font-size:14px;color:var(--petrol-mid);line-height:1.55;margin-bottom:22px}
.confirm-btns{display:flex;gap:10px}
.confirm-cancel{flex:1;padding:13px;border-radius:12px;border:1px solid var(--border2);background:transparent;color:var(--text-light);font-size:14px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif}
.confirm-ok{flex:1;padding:13px;border-radius:12px;border:none;background:#ff5555;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif}

/* Toast */
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);border-radius:99px;padding:10px 22px;font-size:14px;font-weight:600;color:var(--amber);z-index:300;opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Über */
.about-logo{text-align:center;padding:30px 0 20px}
.about-app-name{font-size:28px;font-weight:800;color:var(--amber);}
.about-version{font-size:13px;color:var(--petrol-mid);margin-top:4px}

@media(min-width:600px){svg{border:1px solid #333}}

/* Subscreen background */
.sub-bg{position:relative;min-height:100%}
.sub-bg-svg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.sub-content{position:relative;z-index:1}

/* Subscreen header */
.sub-header{
  background:#8B6BB0;
  padding:max(env(safe-area-inset-top,16px),16px) 20px 14px;
  border-bottom:1px solid rgba(0,0,0,0.12);
  display:flex;align-items:center;gap:14px;
  flex-shrink:0;
  position:sticky;top:0;z-index:10;
}
.sub-back{
  width:48px;height:48px;border-radius:50%;
  border:2px solid #F5C04A;
  background:#F5C04A;
  color:#1a1200;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-family:Inter,sans-serif;flex-shrink:0;
}
.sub-title{font-size:18px;font-weight:700;color:#FFE566}

/* Subscreen body */
.sub-body{flex:1;overflow-y:auto;padding:16px 14px;-webkit-overflow-scrolling:touch;background:transparent;box-sizing:border-box}

/* Subscreen card */
.sc{
  background:#4A6970;
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
}
.sc-label{
  font-size:10px;font-weight:700;
  color:#9CB0BA;
  letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:8px;
}
.sc-title{font-size:16px;font-weight:700;color:#F5F4EE;margin-bottom:6px}
.sc-body{font-size:14px;color:#F5F4EE;line-height:1.6}
.sc-muscle{font-size:11px;color:#9CB0BA;margin-bottom:12px}

/* Section label */
.sub-sl{
  font-size:13px;font-weight:700;color:#324A52;
  letter-spacing:.14em;text-transform:uppercase;
  margin:20px 0 10px;
  display:flex;align-items:center;gap:10px;
}
.sub-sl::after{content:"";flex:1;height:1px;background:rgba(110,136,150,0.3)}
.sub-sl:first-child{margin-top:0}

/* Val tiles in detail */
.sub-val-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px;width:100%;box-sizing:border-box;overflow:hidden}
.sub-val-tile{background:#8B6BB0;border-radius:12px;padding:12px 6px;text-align:center}
.sub-val-label{font-size:13px;font-weight:700;color:#9CB0BA;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.sub-val-ctrl{display:flex;align-items:center;justify-content:center;gap:8px}
.sub-val-btn{
  width:30px;height:30px;border-radius:50%;
  border:1.5px solid rgba(255,229,102,0.5);
  background:transparent;color:#FFE566;
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-family:Inter,sans-serif;line-height:1;
}
.sub-val-btn:active{background:rgba(245,192,74,0.15)}
.sub-val-num{font-size:20px;font-weight:700;color:#E0EAF0;min-width:36px;text-align:center}

/* Chart in detail */
.sub-chart-area{height:80px;display:flex;align-items:flex-end;gap:4px;margin-top:8px}
.sub-chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.sub-chart-bar{width:100%;border-radius:4px 4px 0 0;min-height:2px;background:rgba(255,255,255,0.3)}
.sub-chart-bar.now{background:#FFE566}
.sub-chart-lbl{font-size:9px;color:#9CB0BA;text-align:center}
.sub-chart-val{font-size:9px;color:#F5F4EE;font-weight:600;text-align:center}

/* KW input */
.sub-kw-row{display:flex;gap:10px;margin-bottom:12px}
.sub-kw-input{
  flex:1;background:rgba(255,255,255,0.15);
  border:1.5px solid rgba(255,255,255,0.3);
  border-radius:12px;padding:12px 16px;
  font-size:18px;font-weight:700;color:#F5F4EE;
  font-family:Inter,sans-serif;text-align:center;outline:none;
}
.sub-kw-input::placeholder{color:rgba(255,255,255,0.4)}
.sub-kw-input:focus{border-color:#F5C04A}
.sub-kw-save{
  padding:12px 18px;background:#F5C04A;
  border:none;border-radius:12px;
  color:#1a0e00;font-size:14px;font-weight:700;
  cursor:pointer;font-family:Inter,sans-serif;
}
.sub-kw-entry{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.1);
  font-size:13px;color:#F5F4EE;
}
.sub-kw-entry:last-child{border-bottom:none}
.sub-kw-date{color:#9CB0BA;font-size:14px}
.sub-kw-val{font-weight:700;color:#FFE566}

/* Goals grid */
.sub-goals-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sub-goal-card{background:#8B6BB0;border-radius:12px;padding:12px 10px}
.sub-goal-title{font-size:15px;font-weight:700;color:#FFE566;margin-bottom:4px}
.sub-goal-desc{font-size:14px;color:#F5F4EE;line-height:1.5}

/* Prinzipien */
.sub-prinzip{background:#8B6BB0;border-radius:12px;padding:14px;margin-bottom:8px}
.sub-prinzip-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sub-prinzip-title{font-size:15px;font-weight:700;color:#FFE566}
.sub-prinzip-text{font-size:14px;color:#F5F4EE;line-height:1.5}
.sub-prinzip-detail{font-size:13px;color:rgba(224,234,240,0.7);margin-top:4px;line-height:1.5}

/* Alternativen */
.sub-alt{background:#8B6BB0;border-radius:12px;padding:14px;margin-bottom:8px}
.sub-alt-label{font-size:15px;font-weight:700;color:#FFE566;margin-bottom:6px}
.sub-alt-row{font-size:14px;color:#F5F4EE;line-height:1.7}
.sub-alt-key{color:rgba(224,234,240,0.7);font-weight:600}

/* Settings */
.sub-setting-row{
  display:flex;justify-content:space-between;align-items:center;
  background:#8B6BB0;border-radius:12px;padding:14px;margin-bottom:8px;
}
.sub-setting-label{font-size:15px;font-weight:600;color:#F5F4EE}
.sub-setting-sub{font-size:14px;color:rgba(224,234,240,0.7);margin-top:2px}
.sub-step-ctrl{display:flex;align-items:center;gap:8px}
.sub-step-btn{
  width:32px;height:32px;border-radius:50%;
  border:1.5px solid rgba(255,229,102,0.5);background:transparent;
  color:#FFE566;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-family:Inter,sans-serif;
}
.sub-step-val{font-size:15px;font-weight:700;color:#FFE566;min-width:48px;text-align:center}
.sub-danger-btn{
  width:100%;padding:14px;border-radius:12px;
  border:1px solid rgba(255,85,85,0.4);background:rgba(255,85,85,0.1);
  color:#ff6666;font-size:15px;font-weight:600;cursor:pointer;
  font-family:Inter,sans-serif;margin-bottom:8px;text-align:left;
}
.sub-action-btn{
  width:100%;padding:14px;border-radius:12px;
  border:none;background:#4A6970;
  color:#E0EAF0;font-size:15px;font-weight:600;cursor:pointer;
  font-family:Inter,sans-serif;margin-bottom:8px;text-align:left;
}
.det-name-input{
  flex:1;background:transparent;border:none;border-bottom:1.5px solid rgba(255,229,102,0.5);
  color:#FFE566;font-size:17px;font-weight:700;font-family:Inter,sans-serif;
  padding:4px 0;outline:none;min-width:0;
}
.det-name-input:focus{border-bottom-color:#FFE566;}
</style>
</head>

<div class="screen" id="screen-menu" style="background:linear-gradient(to bottom,#EDE8FA,#DDD5F5)">
  <div class="sub-header">
    <button class="sub-back" onclick="closeScreen('screen-menu')"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1a1200" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="sub-title">Menü</div>
  </div>
  <div class="sub-body">

    <div class="sub-sl">⚖️ Körpergewicht</div>
    <div class="sc">
      <div class="sub-kw-row">
        <input class="sub-kw-input" id="kw-input" type="number" step="0.1" min="30" max="300" placeholder="kg">
        <button class="sub-kw-save" onclick="saveKW()">Speichern</button>
      </div>
      <div id="kw-list"></div>
    </div>

    <div class="sub-sl">📦 Daten</div>
    <button class="sub-action-btn" onclick="exportJSON()">↓ &nbsp;Export JSON</button>
    <button class="sub-action-btn" onclick="importJSON()">↑ &nbsp;Import JSON</button>

    <div class="sub-sl">⚙️ Einstellungen</div>
    <div class="sub-setting-row">
      <div><div class="sub-setting-label">Schritt pro Wisch</div><div class="sub-setting-sub">Gilt für alle Übungen</div></div>
      <div class="sub-step-ctrl">
        <button class="sub-step-btn" onclick="adjustStep(-1)">−</button>
        <div class="sub-step-val" id="step-display">2.5 kg</div>
        <button class="sub-step-btn" onclick="adjustStep(+1)">+</button>
      </div>
    </div>
    <button class="sub-danger-btn" onclick="confirmAction('reset-prog','Progression zurücksetzen?','Alle Gewichte werden auf die Startwerte zurückgesetzt.')">⚠️ &nbsp;Progression zurücksetzen</button>
    <button class="sub-danger-btn" onclick="confirmAction('delete-all','Alle Daten löschen?','Alles wird unwiderruflich gelöscht.')">🗑️ &nbsp;Alle Daten löschen</button>
</div>

<input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)">

<div class="confirm-backdrop" id="confirm-backdrop">
  <div class="confirm-box">
    <div class="confirm-title" id="confirm-title">Sicher?</div>
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="closeConfirm()">Abbrechen</button>
      <button class="confirm-ok" onclick="executeConfirm()">Ja, löschen</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const EXERCISES = [
  {id:'rudern_e', name:'Einarm. Rudern', emoji:'🚣', muscle:'Lat · Rücken · Bizeps', note:'Abgestützt auf der Bank. Schulterblatt am Ende einziehen. Pro Seite ausführen.', w:5.0, r:12, s:3},
  {id:'rev_flyes', name:'Reverse Flyes', emoji:'🕊️', muscle:'Hintere Schulter · Rücken', note:'Leichtes Gewicht. Arme leicht gebeugt, kontrolliert nach hinten führen.', w:1.25, r:12, s:3},
  {id:'dead_bug', name:'Dead Bug', emoji:'🐛', muscle:'Core · Stabilität', note:'Rücken flach auf dem Boden. Arm und Gegenbein gleichzeitig absenken. Langsam und kontrolliert.', w:0, r:8, s:3},
  {id:'bank_f', name:'Bankdrücken', emoji:'💪', muscle:'Brust · Trizeps · Schulter', note:'Neutral-Griff schont das Schultergelenk. Bei Nackenproblemen weglassen.', w:3.5, r:12, s:3},
  {id:'glute_f', name:'Glute Bridge', emoji:'⛩️', muscle:'Gesäß · Core', note:'Langsam und bewusst. Becken oben 1–2 Sek. halten.', w:0, r:15, s:3},
  {id:'hip_thrust', name:'Hip Thrust', emoji:'🏋️', muscle:'Gesäß · Hüfte', note:'Schultern auf Bank abgestützt. Hüfte oben kurz halten. Langsam absenken.', w:0, r:12, s:3},
  {id:'seith_rev', name:'Seitheben', emoji:'🕊️', muscle:'Seitliche Schulter', note:'Pflicht zur Nackenprävention! Sehr leichtes Gewicht. Arme leicht gebeugt.', w:2.5, r:12, s:3},
  {id:'hammer', name:'Hammer Curls', emoji:'🔨', muscle:'Bizeps · Unterarm', note:'Neutraler Griff, Ellbogen fixiert. Langsam absenken.', w:3.5, r:12, s:3},
  {id:'tricep_f', name:'Trizeps', emoji:'⚡', muscle:'Trizeps · Oberarm', note:'Ellbogen fixiert, 3 Sek. absenken. Nacken entspannt.', w:3.5, r:12, s:3},
  {id:'inner_thigh', name:'Inner Thigh', emoji:'🦵', muscle:'Innere Oberschenkel', note:'Kontrollierte Bewegung. Bein langsam heben und senken.', w:0, r:15, s:3},
];
const DEFAULTS = EXERCISES.map(e => ({w:e.w,r:e.r,s:e.s}));
const STORAGE_KEY  = 'mkraft_v2';
const HISTORY_KEY  = 'mkraft_history_v2';
const KW_KEY       = 'mkraft_kw_v2';
const SETTINGS_KEY = 'mkraft_settings_v2';
const SWIPE_THRESHOLD = 30;
const STEP_OPTIONS = [0.5,1.0,1.5,2.0,2.5,3.0,5.0];

let STATE = {step:2.5};
let HISTORY = {};
let KW_DATA = [];

function loadAll() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    EXERCISES.forEach(ex => {
      if(s[ex.id]){
        if(typeof s[ex.id].w==='number') ex.w=s[ex.id].w;
        if(typeof s[ex.id].r==='number') ex.r=s[ex.id].r;
        if(typeof s[ex.id].s==='number') ex.s=s[ex.id].s;
      }
    });
    HISTORY = JSON.parse(localStorage.getItem(HISTORY_KEY)||'{}');
    KW_DATA = JSON.parse(localStorage.getItem(KW_KEY)||'[]');
    const set = JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}');
    if(typeof set.step==='number') STATE.step=set.step;
  } catch(e){}
}

function saveExercises(){
  const d={};
  EXERCISES.forEach(ex=>{d[ex.id]={w:ex.w,r:ex.r,s:ex.s};});
  localStorage.setItem(STORAGE_KEY,JSON.stringify(d));
}
function saveHistory(){ localStorage.setItem(HISTORY_KEY,JSON.stringify(HISTORY)); }
function saveKWData(){ localStorage.setItem(KW_KEY,JSON.stringify(KW_DATA)); }
function saveSettings(){ localStorage.setItem(SETTINGS_KEY,JSON.stringify(STATE)); }

function recordHistory(exId,w){
  if(!HISTORY[exId]) HISTORY[exId]=[];
  const today=todayStr();
  const idx=HISTORY[exId].findIndex(e=>e.date===today);
  if(idx>=0) HISTORY[exId][idx].w=w;
  else HISTORY[exId].push({date:today,w});
  const cutoff=daysAgoStr(30);
  HISTORY[exId]=HISTORY[exId].filter(e=>e.date>=cutoff);
  saveHistory();
}

function renderAll(){
  EXERCISES.forEach((ex,i)=>{
    const wEl=document.getElementById('ex-weight-'+i);
    const rEl=document.getElementById('ex-val-'+i);
    const wStr=Number.isInteger(ex.w)?ex.w:ex.w.toFixed(1);
    if(wEl) wEl.textContent=wStr;
    if(rEl) rEl.textContent=ex.r;
  });
}

function setupHitAreas(){
  for(let i=0;i<EXERCISES.length;i++){
    const el=document.getElementById('hit-'+i);
    if(!el) continue;
    el.style.touchAction='manipulation';
    (function(idx){
      let startX=0,startY=0,lastX=0,moved=false,isHoriz=false,decided=false;
      let lastTap=0;

      el.addEventListener('touchstart',e=>{
        if(e.touches.length>1) return;
        const t=e.touches[0];
        startX=t.clientX;startY=t.clientY;lastX=t.clientX;
        moved=false;isHoriz=false;decided=false;
      },{passive:true});

      el.addEventListener('touchmove',e=>{
        if(e.touches.length>1) return;
        const t=e.touches[0];
        const dx=Math.abs(t.clientX-startX);
        const dy=Math.abs(t.clientY-startY);
        if(!decided&&(dx>6||dy>6)){
          decided=true;
          isHoriz=dx>dy;
        }
        if(isHoriz){
          moved=true;
          const chunk=t.clientX-lastX;
          if(Math.abs(chunk)>=30){changeWeight(idx,chunk>0?STATE.step:-STATE.step);lastX=t.clientX;}
          e.preventDefault();
        }
      },{passive:false});

      el.addEventListener('touchend',e=>{
        if(moved||isHoriz) return;
        const now=Date.now();
        if(now-lastTap<350){
          // Double tap → open detail
          openDetail(idx);
          lastTap=0;
        } else {
          lastTap=now;
        }
      },{passive:true});
    })(i);
  }
  const menuEl=document.getElementById('hit-menu');
  if(menuEl){
    menuEl.addEventListener('touchend',e=>{openScreen('screen-menu');e.preventDefault();},{passive:false});
  }
}

function changeWeight(idx,delta){
  const ex=EXERCISES[idx];
  ex.w=Math.max(0,Math.round((ex.w+delta)*10)/10);
  renderAll();
  recordHistory(ex.id,ex.w);
  saveExercises();
  const el=document.getElementById('ex-weight-'+idx);
  if(el){
    el.style.transition='none';
    el.style.fill=delta>0?'#FFE8A0':'#9CB0BA';
    setTimeout(()=>{el.style.transition='fill .4s';el.style.fill='';},50);
    setTimeout(()=>{el.style.transition='';},450);
  }
}

let detIdx=0;
function openDetail(idx){
  detIdx=idx;
  const ex=EXERCISES[idx];
  document.getElementById('det-title').value=ex.name;
  document.getElementById('det-muscle').textContent=ex.muscle;
  document.getElementById('det-note').textContent=ex.note;
  renderDetailVals();
  renderChart(ex);
  openScreen('screen-detail');
}

function renderDetailVals(){
  const ex=EXERCISES[detIdx];
  document.getElementById('det-w').textContent=Number.isInteger(ex.w)?ex.w:ex.w.toFixed(1);
  document.getElementById('det-r').textContent=ex.r;
  document.getElementById('det-s').textContent=ex.s;
}

function detAdjust(field,dir){
  const ex=EXERCISES[detIdx];
  if(field==='w'){ex.w=Math.max(0,Math.round((ex.w+dir*STATE.step)*10)/10);recordHistory(ex.id,ex.w);}
  else if(field==='r') ex.r=Math.max(1,ex.r+dir);
  else if(field==='s') ex.s=Math.max(1,ex.s+dir);
  renderDetailVals();renderAll();saveExercises();
  if(field==='w') renderChart(ex);
}

function renderChart(ex){
  const container=document.getElementById('det-chart');
  const history=(HISTORY[ex.id]||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
  const last4=history.slice(0,4).reverse();
  if(!last4.length){
    container.innerHTML='<div style="font-size:13px;color:rgba(224,234,240,0.6);text-align:center;padding:16px 0">Noch keine Verlaufsdaten</div>';
    return;
  }
  // Timeline style
  let html='<div style="position:relative;padding:4px 0;width:100%">';
  // vertical line
  html+='<div style="position:absolute;left:7px;top:8px;bottom:8px;width:2px;background:rgba(224,234,240,0.15);border-radius:1px"></div>';
  last4.forEach((entry,i)=>{
    const isLast=i===last4.length-1;
    const prev=last4[i-1];
    let diff='';
    let diffColor='rgba(224,234,240,0.6)';
    if(prev){
      const d=Math.round((entry.w-prev.w)*10)/10;
      if(d>0){diff='↑ +'+d;diffColor='#6adb8a';}
      else if(d<0){diff='↓ '+d;diffColor='#ff7070';}
      else{diff='→';diffColor='rgba(224,234,240,0.5)';}
    }
    const dotColor=isLast?'#F5C04A':'rgba(224,234,240,0.4)';
    const dotBorder=isLast?'#F5C04A':'rgba(224,234,240,0.6)';
    const dotSize=isLast?8:5;
    const wColor=isLast?'#F5C04A':'#E0EAF0';
    const wSize=isLast?17:15;
    const wWeight=isLast?'700':'500';
    const label=isLast?'<span style="font-size:12px;font-weight:700;color:#F5C04A;margin-left:6px">JETZT</span>':'';
    html+=`<div style="display:flex;align-items:center;gap:12px;padding:7px 0;position:relative">
      <div style="width:${dotSize*2}px;height:${dotSize*2}px;border-radius:50%;background:${dotColor};border:2px solid ${dotBorder};flex-shrink:0;position:relative;z-index:1;margin-left:${isLast?0:2}px"></div>
      <span style="font-size:13px;color:rgba(224,234,240,0.6);min-width:48px">${formatDate(entry.date)}</span>
      <span style="font-size:${wSize}px;font-weight:${wWeight};color:${wColor}">${entry.w} kg</span>
      ${diff?`<span style="font-size:13px;color:${diffColor}">${diff}</span>`:''}
      ${label}
    </div>`;
  });
  html+='</div>';
  container.innerHTML=html;
}

function saveKW(){
  const val=parseFloat(document.getElementById('kw-input').value);
  if(isNaN(val)||val<30||val>300){showToast('Ungültiger Wert');return;}
  const today=todayStr();
  const idx=KW_DATA.findIndex(e=>e.date===today);
  if(idx>=0) KW_DATA[idx].w=val;
  else KW_DATA.push({date:today,w:val});
  KW_DATA.sort((a,b)=>b.date.localeCompare(a.date));
  saveKWData();
  document.getElementById('kw-input').value='';
  renderKWList();
  showToast('Gespeichert ✓');
}

function renderKWList(){
  const el=document.getElementById('kw-list');
  if(!KW_DATA.length){el.innerHTML='<div style="font-size:13px;color:'+"''' + TEXT_SUB + '''"+';padding:8px 0">Noch keine Einträge</div>';return;}
  el.innerHTML=KW_DATA.slice(0,20).map(e=>'<div class="sub-kw-entry"><span class="sub-kw-date">'+formatDate(e.date)+'</span><span class="sub-kw-val">'+e.w+' kg</span></div>').join('');
}

function adjustStep(dir){
  const idx=STEP_OPTIONS.indexOf(STATE.step);
  STATE.step=STEP_OPTIONS[Math.max(0,Math.min(STEP_OPTIONS.length-1,idx+dir))];
  document.getElementById('step-display').textContent=STATE.step+' kg';
  saveSettings();
}

function exportJSON(){
  const data={version:2,exported:new Date().toISOString(),exercises:{},history:HISTORY,kw:KW_DATA,settings:STATE};
  EXERCISES.forEach(ex=>{data.exercises[ex.id]={w:ex.w,r:ex.r,s:ex.s};});
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='mkraft_backup_'+todayStr()+'.json';a.click();URL.revokeObjectURL(url);
  showToast('Export erfolgreich ✓');
}

function importJSON(){ document.getElementById('import-file').click(); }

function handleImport(e){
  const file=e.target.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(data.exercises) EXERCISES.forEach(ex=>{if(data.exercises[ex.id]){if(typeof data.exercises[ex.id].w==='number')ex.w=data.exercises[ex.id].w;if(typeof data.exercises[ex.id].r==='number')ex.r=data.exercises[ex.id].r;if(typeof data.exercises[ex.id].s==='number')ex.s=data.exercises[ex.id].s;}});
      if(data.history){HISTORY=data.history;saveHistory();}
      if(data.kw){KW_DATA=data.kw;saveKWData();}
      if(data.settings?.step){STATE.step=data.settings.step;saveSettings();}
      saveExercises();renderAll();showToast('Import erfolgreich ✓');
    }catch(err){showToast('Fehler beim Import');}
    e.target.value='';
  };
  reader.readAsText(file);
}

let pendingAction=null;
function confirmAction(action,title,msg){
  pendingAction=action;
  document.getElementById('confirm-title').textContent=title;
  document.getElementById('confirm-msg').textContent=msg;
  document.getElementById('confirm-backdrop').classList.add('visible');
}
function closeConfirm(){ document.getElementById('confirm-backdrop').classList.remove('visible');pendingAction=null; }
function executeConfirm(){
  if(pendingAction==='reset-prog'){
    EXERCISES.forEach((ex,i)=>{ex.w=DEFAULTS[i].w;ex.r=DEFAULTS[i].r;ex.s=DEFAULTS[i].s;});
    saveExercises();renderAll();showToast('Progression zurückgesetzt');
  }else if(pendingAction==='delete-all'){
    [STORAGE_KEY,HISTORY_KEY,KW_KEY,SETTINGS_KEY].forEach(k=>localStorage.removeItem(k));
    HISTORY={};KW_DATA=[];
    EXERCISES.forEach((ex,i)=>{ex.w=DEFAULTS[i].w;ex.r=DEFAULTS[i].r;ex.s=DEFAULTS[i].s;});
    STATE.step=2.5;renderAll();showToast('Alle Daten gelöscht');
  }
  closeConfirm();
}

function openScreen(id){ document.getElementById(id).classList.add('open'); if(id==='screen-menu'){ document.getElementById('step-display').textContent=STATE.step+' kg'; renderKWList(); } }
function closeScreen(id){ document.getElementById(id).classList.remove('open'); }
function openSub(id){ document.getElementById(id).classList.add('open'); if(id==='sub-kw') renderKWList(); }
function closeSub(id){ document.getElementById(id).classList.remove('open'); }

let toastTimer=null;
function showToast(msg){ const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2200); }

function todayStr(){ return new Date().toISOString().slice(0,10); }
function daysAgoStr(n){ const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10); }
function formatDate(str){ const [y,m,d]=str.split('-');return d+'.'+m+'.'+y; }

function saveExName(val){
  if(!val.trim()) return;
  EXERCISES[detIdx].name=val.trim();
  const el=document.getElementById('ex-name-'+detIdx);
  if(el) el.textContent=val.trim();
  saveExercises();
}

// ── Rotation: Seitheben ↔ Reverse Flyes (index 6) ────────────────────
const ROTATION_PAIR_G = [
  {name:'Seitheben', muscle:'Seitliche Schulter', note:'Pflicht zur Nackenprävention! Sehr leichtes Gewicht. Arme leicht gebeugt.'},
  {name:'Reverse Flyes', muscle:'Hintere Schulter · Rücken', note:'Leichtes Gewicht. Arme leicht gebeugt, kontrolliert nach hinten führen.'}
];
function initRotationG(){
  const stored=localStorage.getItem('mkraft_g_rotation');
  const current=stored?parseInt(stored):0;
  const next=(current+1)%2;
  localStorage.setItem('mkraft_g_rotation',String(next));
  const ex=EXERCISES[6];
  ex.name=ROTATION_PAIR_G[next].name;
  ex.muscle=ROTATION_PAIR_G[next].muscle;
  ex.note=ROTATION_PAIR_G[next].note;
}
initRotationG();
loadAll();
renderAll();
setupHitAreas();

if('serviceWorker' in navigator){ navigator.serviceWorker.register('mkraft_sw_g.js').catch(()=>{}); }
</script>
</body>
</html>
